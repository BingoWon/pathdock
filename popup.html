<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draggable Widgets</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="youtube-search">
        <input type="search" name="search_query" placeholder="Search YouTube..." required id="youtube-search-input">
        <button type="submit">Search</button>
        <button id="history-icon">📜</button>
    </div>
    <div id="history-dropdown" class="hidden">
        <ul id="history-list"></ul>
    </div>
    <div id="buttons-container"></div>
    <div id="history-container"></div>
    <!-- <button id="reset-layout">Reset Layout</button> -->
    <!-- <button id="init-layout">Initialize Layout</button> -->
    <button id="send-url">
        <span class="button-title">发送URL到本地服务器</span>
        <div class="ip-info-wrapper">
            <span id="private-ip">内网IP: 获取中...</span>
            <span id="public-ip">公网IP: 获取中...</span>
        </div>
    </button>
    <script src="ipDisplay.js"></script>
    <div id="tabs-container"></div>
    <div id="ignored-sites-container"></div>
    <script src="tabHotel.js"></script>
    <script src="media_player.js"></script>
    <script src="debug.js"></script>
    <script src="youtubeSearchBar.js"></script>
    <script src="historyDropdown.js"></script> <!-- Add this line for the new JS file -->
</body>
</html>
