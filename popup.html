<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathDock</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="top-bar">
        <div id="ip-display">
            <span id="public-ip">Loading IP...</span>
            <button id="copy-ip-btn" title="Copy IP">📋</button>
        </div>
        <div id="youtube-search">
            <input type="search" name="search_query" placeholder="Search YouTube..." required id="youtube-search-input">
            <button type="submit">Search</button>
        </div>
        <div id="backup-actions">
            <button id="export-sites-btn" class="utility-button" title="Export sites" aria-label="Export sites">
                <svg class="utility-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <path d="M7 10l5 5 5-5"></path>
                    <path d="M12 15V3"></path>
                </svg>
            </button>
            <button id="import-sites-btn" class="utility-button" title="Import sites" aria-label="Import sites">
                <svg class="utility-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <path d="M17 8l-5-5-5 5"></path>
                    <path d="M12 3v12"></path>
                </svg>
            </button>
            <input id="import-sites-input" class="hidden" type="file" accept=".pathdock">
        </div>
        <button id="add-current-btn" class="add-button" title="Add current tab" aria-label="Add current tab">
            <svg class="utility-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M12 5v14"></path>
                <path d="M5 12h14"></path>
            </svg>
        </button>
    </div>
    <div id="buttons-container"></div>
    <script src="browserAPI.js"></script>
    <script src="shared.js"></script>
    <script src="popup.js"></script>
</body>
</html>
