<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathDock</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <header id="top-bar">
        <div id="ip-display">
            <span id="public-ip">IP</span>
            <button id="copy-ip-btn" class="icon-button" type="button" title="Copy IP" aria-label="Copy IP" disabled>Copy</button>
        </div>
        <form id="youtube-search">
            <input type="search" name="search_query" placeholder="Search YouTube..." required id="youtube-search-input">
            <button type="submit">Search</button>
        </form>
        <button id="add-current-btn" class="icon-button add-button" type="button" title="Add current tab" aria-label="Add current tab">+</button>
    </header>
    <main id="sites" aria-label="Saved sites"></main>
    <div id="status" role="status" aria-live="polite"></div>
    <script src="browserAPI.js"></script>
    <script src="shared.js"></script>
    <script src="popup.js"></script>
</body>
</html>
