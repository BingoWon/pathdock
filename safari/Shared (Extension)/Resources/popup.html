<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draggable Widgets</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="top-bar">
        <div id="ip-display">
            <span id="public-ip">Loading IP...</span>
            <button id="copy-ip-btn" title="Copy IP">📋</button>
        </div>
        <div id="youtube-search">
            <input type="search" name="search_query" placeholder="Search YouTube..." required id="youtube-search-input">
            <button type="submit">Search</button>
        </div>
        <button id="add-current-btn" class="add-button" title="Add current tab">➕</button>
    </div>
    <div id="buttons-container"></div>
    <script src="browserAPI.js"></script>
    <script src="utils.js"></script>
    <script src="siteManager.js"></script>
    <script src="youtubeSearchBar.js"></script>
    <script src="ipDisplay.js"></script>
</body>
</html>
